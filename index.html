<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Bridge</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--surface:#fff;--text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);--r:10px;--rl:16px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1c;--surface:#252525;--text:#f0f0f0;--text2:#999;--text3:#555;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15)}
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
.layout{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface);
  border-bottom:0.5px solid var(--border2);flex-shrink:0;flex-wrap:wrap;z-index:10}
.topbar h1{font-size:17px;font-weight:600}
.pill{padding:5px 13px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid}
.pill.start{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.pill.end{background:#FBEAF0;color:#4B1528;border-color:#ED93B1}
.sep{color:var(--text3)}
.score{margin-left:auto;font-size:13px;color:var(--text2)}
.score b{color:var(--text);font-size:16px}
.btns{display:flex;gap:6px}
.btn{padding:6px 14px;border-radius:var(--r);font-size:13px;cursor:pointer;
  border:0.5px solid var(--border2);background:transparent;color:var(--text);
  font-family:inherit;transition:background .12s,transform .1s;white-space:nowrap}
.btn:hover{background:var(--bg)}
.btn:active{transform:scale(0.97)}
.btn-p{background:var(--text);color:var(--surface);border-color:transparent;font-weight:500}
.btn-p:hover{opacity:.85;background:var(--text)}
.btn-f{background:#FBEAF0;color:#4B1528;border-color:#ED93B1;font-weight:500}
.btn-f:hover{background:#F4C0D1}
.graph-area{flex:1;position:relative;overflow:hidden;user-select:none}
#svg{width:100%;height:100%;display:block}
.hintbar{position:absolute;bottom:0;left:0;right:0;padding:6px 16px;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(6px);
  border-top:0.5px solid var(--border);font-size:12px;color:var(--text2);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;pointer-events:none}
@media(prefers-color-scheme:dark){.hintbar{background:rgba(28,28,28,0.9)}}
.hk{background:var(--border2);border-radius:4px;padding:1px 6px;font-size:11px;font-family:monospace}
.toast{position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:0.5px solid var(--border2);border-radius:20px;
  padding:6px 16px;font-size:13px;color:var(--text2);white-space:nowrap;
  pointer-events:none;transition:opacity .3s;box-shadow:0 2px 12px rgba(0,0,0,0.1);z-index:20}
.toast.err{color:#A32D2D;border-color:#F09595}
.toast.ok{color:#0F6E56;border-color:#5DCAA5}
.toast.load{color:#185FA5}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.3}}
.ld{animation:ld 1s infinite}
.popup{position:absolute;background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--rl);padding:14px;box-shadow:0 8px 32px rgba(0,0,0,0.15);
  z-index:30;width:220px;display:none}
.popup input{width:100%;padding:8px 12px;border-radius:20px;border:1.5px solid var(--border2);
  background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:inherit}
.popup input:focus{border-color:#7F77DD}
.popup-hint{font-size:11px;color:var(--text3);margin-top:6px;text-align:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;
  align-items:center;justify-content:center;z-index:50;padding:1rem}
.modal{background:var(--surface);border-radius:var(--rl);padding:1.5rem;
  max-width:500px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.18)}
.modal h2{font-size:18px;font-weight:600;margin-bottom:4px}
.modal p{font-size:14px;color:var(--text2);margin-bottom:1rem}
.pgrid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.pbtn{padding:7px 13px;border-radius:20px;border:1px solid var(--border2);
  background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit}
.pbtn:hover{background:#EEEDFE;border-color:#AFA9EC;color:#26215C}
.grade{font-size:30px;font-weight:700;margin-bottom:4px}
.rsub{font-size:14px;color:var(--text2);margin-bottom:1.2rem}
.rlist{max-height:240px;overflow-y:auto;margin-bottom:1.2rem}
.rrow{display:flex;justify-content:space-between;padding:6px 0;
  border-bottom:0.5px solid var(--border);font-size:14px}
.rrow:last-child{border:none}
.mact{display:flex;gap:8px}
</style>
</head>
<body>
<div class="layout">
  <div class="topbar">
    <h1>Word Bridge</h1>
    <div class="pill start" id="lbl-start">—</div>
    <span class="sep">···</span>
    <div class="pill end" id="lbl-end">—</div>
    <div class="score">Очки: <b id="lbl-score">0</b></div>
    <div class="btns">
      <button class="btn btn-f" onclick="finishGame()">Финиш!</button>
      <button class="btn" onclick="pickRandom()">Новая игра</button>
    </div>
  </div>
  <div class="graph-area" id="ga">
    <svg id="svg"></svg>
    <div class="hintbar">
      <span><span class="hk">тянуть карточку</span> — переместить</span>
      <span><span class="hk">тянуть от кружка ●</span> — создать связь</span>
      <span><span class="hk">2×клик</span> на холсте — добавить слово</span>
      <span><span class="hk">клик по связи + Del</span> — удалить</span>
    </div>
    <div class="toast" id="toast" style="opacity:0"></div>
    <div class="popup" id="popup">
      <input id="popup-inp" type="text" placeholder="Введите слово..." maxlength="30"/>
      <div class="popup-hint">Enter — добавить · Esc — отмена</div>
    </div>
  </div>
</div>

<div class="overlay" id="pair-modal">
  <div class="modal">
    <h2>Выберите пару слов</h2>
    <p>Постройте цепочку ассоциаций между двумя словами</p>
    <div class="pgrid" id="pgrid"></div>
    <div class="mact"><button class="btn btn-p" onclick="pickRandom()">Случайная пара</button></div>
  </div>
</div>

<div class="overlay" id="res-modal" style="display:none">
  <div class="modal">
    <div class="grade" id="res-grade"></div>
    <div class="rsub" id="res-sub"></div>
    <div class="rlist" id="res-list"></div>
    <div class="mact">
      <button class="btn btn-p" onclick="hideResult();pickRandom()">Новая игра</button>
      <button class="btn" onclick="hideResult()">Смотреть граф</button>
    </div>
  </div>
</div>

function randomPair(){
  var copy=WORDS.slice();
  var i=Math.floor(Math.random()*copy.length);
  var a=copy.splice(i,1)[0];
  // pick second word that's different enough (just random from rest)
  var j=Math.floor(Math.random()*copy.length);
  var b=copy[j];
  return[a,b];
}

var PAIRS=[];
for(var _i=0;_i<60;_i++){
  PAIRS.push(randomPair());
}

  "ЛОЖЬ":"🤥","ПРАВДА":"💎","МАСКА":"🎭","КОРЕНЬ":"🌿","КРЫЛО":"🪶","ЛАБИРИНТ":"🌀",

function em(w){return EM[w]||"💬"}

// SVG NS
var NS="http://www.w3.org/1999/xhtml";
var SVG="http://www.w3.org/2000/svg";

var nodes=[],edges=[],nid=0,totalScore=0,startWord="",endWord="";
var selectedEdge=null,busy=false,pendingEdgeSrc=null,pendingEdgePos=null;
var svg,edgeLayer,nodeLayer,dragLineEl;

// Port offsets [dx,dy] relative to node center
var PORTS=[[0,-38],[0,38],[-56,0],[56,0]];

function getKey(){return localStorage.getItem("groq_key")||""}
function promptKey(){
  var k=prompt("Enter your Groq API key (gsk_...):\n\nGet it free at: console.groq.com/keys");
  if(k&&k.trim().length>10){localStorage.setItem("groq_key",k.trim());return k.trim()}
  return null;
}

async function groqReq(prompt,mt){
  var key=getKey();if(!key){key=promptKey()}if(!key)throw new Error("no_key");
  var r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"content-type":"application/json","authorization":"Bearer "+key},
    body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:mt,
      messages:[{role:"user",content:prompt}]})
  });
  if(!r.ok){var e=await r.json();throw new Error((e.error&&e.error.message)||r.status)}
  var d=await r.json();
  return(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||""
}

async function evalSim(w1,w2){
  var t=await groqReq(
    "Rate semantic similarity of two Russian words 0-100. 0=unrelated, 100=synonyms. "+
    "Consider all associations and metaphors. Words: "+w1+" and "+w2+". "+
    "Reply with ONE integer only, nothing else.",16);
  var m=t.match(/\d+/);if(!m)return 50;
  var n=parseInt(m[0],10);return isNaN(n)?50:Math.min(100,Math.max(0,n));
}

async function fetchEmoji(word){
  try{
    var t=await groqReq("One emoji for Russian word: "+word+". Reply with exactly one emoji only.",5);
    var chars=Array.from(t.trim());
    for(var i=0;i<chars.length;i++){var cp=chars[i].codePointAt(0);if(cp>127)return chars[i]}
    return "💬";
  }catch(e){return "💬"}
}

function scoreColor(s){
  var t=s/100;
  return "rgb("+Math.round(220-186*t)+","+Math.round(60+137*t)+","+Math.round(60+34*t)+")";
}
function edgeW(s){return 1.5+s/20}

var toastT;
function toast(msg,type,dur){
  dur=dur||2800;
  var el=document.getElementById("toast");
  el.className="toast"+(type?" "+type:"");
  el.innerHTML=(type==="load"?"<span class='ld'>⬤</span> ":"")+msg;
  el.style.opacity="1";
  clearTimeout(toastT);
  if(type!=="load")toastT=setTimeout(function(){el.style.opacity="0"},dur);
}

// ---- SVG helpers ----
function el(tag,attrs,parent){
  var e=document.createElementNS(SVG,tag);
  if(attrs)Object.keys(attrs).forEach(function(k){e.setAttribute(k,attrs[k])});
  if(parent)parent.appendChild(e);
  return e;
}
function fo(parent,x,y,w,h){
  var f=el("foreignObject",{x:x,y:y,width:w,height:h},parent);
  return f;
}

// ---- State ----
function getNode(id){return nodes.find(function(n){return n.id===id})}
function getEdge(id){return edges.find(function(e){return e.id===id})}

// ---- Init ----
function initSVG(){
  var ga=document.getElementById("ga");
  svg=document.getElementById("svg");
  svg.setAttribute("width",ga.clientWidth);
  svg.setAttribute("height",ga.clientHeight);
  while(svg.firstChild)svg.removeChild(svg.firstChild);

  edgeLayer=el("g",{},svg);
  nodeLayer=el("g",{},svg);

  // Drag line
  dragLineEl=el("line",{
    "stroke":"#7F77DD","stroke-width":"2","stroke-dasharray":"6,3","opacity":"0","pointer-events":"none"
  },svg);

  // Double click on SVG background = add node
  svg.addEventListener("dblclick",function(ev){
    if(ev.target!==svg&&ev.target!==edgeLayer)return;
    var rc=svg.getBoundingClientRect();
    showPopup(ev.clientX-rc.left,ev.clientY-rc.top);
  });
  svg.addEventListener("click",function(ev){
    if(ev.target===svg||ev.target===edgeLayer)deselectEdge();
  });
}

// ---- Render edge ----
function makeEdgeEl(e){
  var g=el("g",{"class":"eg","cursor":"pointer"},edgeLayer);
  g.dataset.id=e.id;

  var line=el("line",{"stroke-linecap":"round","pointer-events":"stroke"},g);
  var badge=el("rect",{"rx":"8","ry":"8","width":"38","height":"20","pointer-events":"none"},g);
  var label=el("text",{
    "text-anchor":"middle","dominant-baseline":"central",
    "font-size":"11","font-weight":"700","pointer-events":"none",
    "font-family":"-apple-system,BlinkMacSystemFont,sans-serif"
  },g);

  g.addEventListener("click",function(ev){
    ev.stopPropagation();
    if(selectedEdge===e.id){deselectEdge();return}
    selectEdge(e.id);
  });

  e._el={g:g,line:line,badge:badge,label:label};
  updateEdgePos(e);
  updateEdgeStyle(e);
}

function updateEdgePos(e){
  var s=getNode(e.source),t=getNode(e.target);
  if(!s||!t||!e._el)return;
  var sx=s.x,sy=s.y,tx=t.x,ty=t.y;
  var mx=(sx+tx)/2,my=(sy+ty)/2;
  e._el.line.setAttribute("x1",sx);e._el.line.setAttribute("y1",sy);
  e._el.line.setAttribute("x2",tx);e._el.line.setAttribute("y2",ty);
  e._el.badge.setAttribute("x",mx-19);e._el.badge.setAttribute("y",my-10);
  e._el.label.setAttribute("x",mx);e._el.label.setAttribute("y",my);
}

function updateEdgeStyle(e){
  if(!e._el)return;
  var c=scoreColor(e.score),w=edgeW(e.score);
  e._el.line.setAttribute("stroke",c);
  e._el.line.setAttribute("stroke-width",selectedEdge===e.id?w+2.5:w);
  e._el.line.setAttribute("stroke-dasharray",selectedEdge===e.id?"6,3":"");
  e._el.badge.setAttribute("fill","white");
  e._el.badge.setAttribute("stroke",c);
  e._el.label.setAttribute("fill",c);
  e._el.label.textContent="+"+e.score;
}

function removeEdgeEl(e){
  if(e._el&&e._el.g&&e._el.g.parentNode)e._el.g.parentNode.removeChild(e._el.g);
  e._el=null;
}

// ---- Render node ----
var NH=68;
function nodeWidth(word){
  // min 108, max 160, grows with word length
  return Math.min(160, Math.max(108, word.length * 11 + 20));
}
function makeNodeEl(n){
  var g=el("g",{"class":"ng"},nodeLayer);
  g.dataset.id=n.id;
  g.style.cursor="default";

  // Card rect (drag to move)
  var NW=nodeWidth(n.word);
  n._nw=NW;
  var card=el("rect",{
    "x":-NW/2,"y":-NH/2,"width":NW,"height":NH,"rx":"14","ry":"14","cursor":"grab"
  },g);
  card.setAttribute("fill",n.type==="start"?"#E1F5EE":n.type==="end"?"#FBEAF0":"#ffffff");
  card.setAttribute("stroke",n.type==="start"?"#5DCAA5":n.type==="end"?"#ED93B1":"#d0cdc8");
  card.setAttribute("stroke-width",n.type==="start"||n.type==="end"?"2":"1");

  // Emoji
  var emoji=el("text",{"text-anchor":"middle","y":"-8","font-size":"22","pointer-events":"none"},g);
  emoji.textContent=n.em||em(n.word);

  // Word label
  var lbl=el("text",{
    "text-anchor":"middle","y":"18","font-size":"12","font-weight":"600",
    "font-family":"-apple-system,BlinkMacSystemFont,sans-serif","pointer-events":"none"
  },g);
  lbl.setAttribute("fill",n.type==="start"?"#085041":n.type==="end"?"#4B1528":"#1a1a1a");
  lbl.textContent=n.word;

  // Port handles — use dynamic width for left/right ports
  var portOffsets=[[0,-38],[0,38],[-NW/2,0],[NW/2,0]];
  portOffsets.forEach(function(p){
    var port=el("circle",{
      "cx":p[0],"cy":p[1],"r":"7",
      "fill":"#7F77DD","stroke":"white","stroke-width":"2","cursor":"crosshair","opacity":"0"
    },g);
    // show ports on card hover
    card.addEventListener("mouseenter",function(){port.setAttribute("opacity","1")});
    card.addEventListener("mouseleave",function(){port.setAttribute("opacity","0")});
    port.addEventListener("mouseenter",function(){port.setAttribute("opacity","1");port.setAttribute("fill","#534AB7")});
    port.addEventListener("mouseleave",function(){port.setAttribute("opacity","0");port.setAttribute("fill","#7F77DD")});
    makeDragEdge(port,n,p);
  });
  // store NW on element for hit detection
  g._nw=NW;

  // Tooltip on hover
  var tip=el("g",{"pointer-events":"none","opacity":"0"},g);
  var tipRect=el("rect",{"rx":"6","ry":"6","fill":"#1a1a1a","height":"22"},tip);
  var tipText=el("text",{
    "text-anchor":"middle","dominant-baseline":"central",
    "font-size":"12","fill":"white",
    "font-family":"-apple-system,BlinkMacSystemFont,sans-serif",
    "y":"-"+(NH/2+14)
  },tip);
  tipText.textContent=n.word;
  // measure text width
  setTimeout(function(){
    try{
      var tw=tipText.getComputedTextLength()+16;
      tipRect.setAttribute("width",tw);
      tipRect.setAttribute("x",-tw/2);
      tipRect.setAttribute("y",-NH/2-25);
    }catch(e){}
  },0);
  card.addEventListener("mouseenter",function(){ tip.setAttribute("opacity","1"); });
  card.addEventListener("mouseleave",function(){ tip.setAttribute("opacity","0"); });

  // Delete button (only for chain nodes)
  if(n.type==="chain"){
    var fobj=fo(g,NW/2-24,-NH/2-4,22,22);
    var div=document.createElementNS(NS,"div");
    div.style.cssText="background:white;border:1.5px solid #F09595;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:#A32D2D;opacity:0;transition:opacity .15s";
    div.textContent="✕";
    fobj.appendChild(div);
    card.addEventListener("mouseenter",function(){div.style.opacity="1"});
    card.addEventListener("mouseleave",function(){div.style.opacity="0"});
    div.addEventListener("mouseenter",function(){div.style.opacity="1"});
    div.addEventListener("click",function(ev){ev.stopPropagation();deleteNode(n.id)});
  }

  // Drag card to move
  makeDragMove(card,n,NW);

  n._el={g:g,card:card,emoji:emoji,lbl:lbl};
  positionNode(n);
}

function positionNode(n){
  if(!n._el)return;
  n._el.g.setAttribute("transform","translate("+n.x+","+n.y+")");
}

function removeNodeEl(n){
  if(n._el&&n._el.g&&n._el.g.parentNode)n._el.g.parentNode.removeChild(n._el.g);
  n._el=null;
}

// ---- Drag: move node ----
function makeDragMove(card,n,NW){
  var ox,oy,startX,startY,dragging=false;
  card.addEventListener("mousedown",function(ev){
    if(ev.button!==0)return;
    ev.stopPropagation();ev.preventDefault();
    dragging=true;
    ox=ev.clientX;oy=ev.clientY;
    startX=n.x;startY=n.y;
    card.setAttribute("cursor","grabbing");
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  });
  function onMove(ev){
    if(!dragging)return;
    var ga=document.getElementById("ga"),rc=ga.getBoundingClientRect();
    n.x=Math.max(NW/2,Math.min(rc.width-NW/2,startX+(ev.clientX-ox)));
    n.y=Math.max(NH/2,Math.min(rc.height-NH/2-30,startY+(ev.clientY-oy)));
    positionNode(n);
    // Update all edges touching this node
    edges.forEach(function(e){
      if(e.source===n.id||e.target===n.id)updateEdgePos(e);
    });
  }
  function onUp(){
    dragging=false;
    card.setAttribute("cursor","grab");
    window.removeEventListener("mousemove",onMove);
    window.removeEventListener("mouseup",onUp);
  }
}

// ---- Drag: draw edge from port ----
function makeDragEdge(port,n,portOffset){
  var drawing=false;
  port.addEventListener("mousedown",function(ev){
    if(ev.button!==0)return;
    ev.stopPropagation();ev.preventDefault();
    drawing=true;
    var rc=svg.getBoundingClientRect();
    var x1=n.x+portOffset[0],y1=n.y+portOffset[1];
    dragLineEl.setAttribute("x1",x1);dragLineEl.setAttribute("y1",y1);
    dragLineEl.setAttribute("x2",x1);dragLineEl.setAttribute("y2",y1);
    dragLineEl.setAttribute("opacity","1");
    window.addEventListener("mousemove",onMove);
    window.addEventListener("mouseup",onUp);
  });
  function onMove(ev){
    if(!drawing)return;
    var rc=svg.getBoundingClientRect();
    var px=ev.clientX-rc.left,py=ev.clientY-rc.top;
    dragLineEl.setAttribute("x2",px);dragLineEl.setAttribute("y2",py);
    // highlight target
    nodes.forEach(function(t){
      if(!t._el)return;
      var hw=(t._nw||108)/2+10;
      var dx=t.x-px,dy=t.y-py,hit=Math.abs(dx)<hw&&Math.abs(dy)<NH/2+10;
      t._el.card.setAttribute("stroke-width",
        hit&&t.id!==n.id?"3":t.type==="start"||t.type==="end"?"2":"1");
    });
  }
  function onUp(ev){
    if(!drawing)return;
    drawing=false;
    dragLineEl.setAttribute("opacity","0");
    nodes.forEach(function(t){
      if(t._el)t._el.card.setAttribute("stroke-width",t.type==="start"||t.type==="end"?"2":"1");
    });
    var rc=svg.getBoundingClientRect();
    var px=ev.clientX-rc.left,py=ev.clientY-rc.top;
    var tgt=nodes.find(function(t){
      if(t.id===n.id)return false;
      var hw=(t._nw||108)/2+10;
      var dx=t.x-px,dy=t.y-py;
      return Math.abs(dx)<hw&&Math.abs(dy)<NH/2+10;
    });
    if(tgt){
      addEdge(n.id,tgt.id);
    } else {
      // dropped on empty space — show popup and auto-connect to source node
      pendingEdgeSrc=n.id;
      pendingEdgePos={x:px,y:py};
      showPopup(px,py);
    }
    window.removeEventListener("mousemove",onMove);
    window.removeEventListener("mouseup",onUp);
  }
}

// ---- Edge/Node CRUD ----
function selectEdge(id){
  deselectEdge();
  selectedEdge=id;
  var e=getEdge(id);if(e)updateEdgeStyle(e);
  toast("Press Del to remove","load",1800);
}
function deselectEdge(){
  if(!selectedEdge)return;
  var e=getEdge(selectedEdge);if(e)updateEdgeStyle(e);
  selectedEdge=null;
}

async function addEdge(srcId,tgtId){
  if(srcId===tgtId)return;
  if(busy){toast("Please wait...","err");return}
  var already=edges.find(function(e){
    return(e.source===srcId&&e.target===tgtId)||(e.source===tgtId&&e.target===srcId);
  });
  if(already){toast("Edge already exists","err");return}
  var s=getNode(srcId),t=getNode(tgtId);
  if(!s||!t)return;
  busy=true;
  toast("Scoring: "+s.word+" \u2014 "+t.word,"load");
  try{
    var score=await evalSim(s.word,t.word);
    var e={id:"e"+(nid++),source:srcId,target:tgtId,score:score};
    edges.push(e);
    makeEdgeEl(e);
    totalScore+=score;
    document.getElementById("lbl-score").textContent=totalScore;
    toast(s.word+" \u2014 "+t.word+": "+score+" pts","ok");
  }catch(ex){toast("Error: "+ex.message,"err",4000)}
  busy=false;
}

function deleteEdge(id){
  var e=getEdge(id);
  if(e){totalScore-=e.score;totalScore=Math.max(0,totalScore);removeEdgeEl(e)}
  edges=edges.filter(function(x){return x.id!==id});
  if(selectedEdge===id)selectedEdge=null;
  document.getElementById("lbl-score").textContent=totalScore;
  toast("Edge removed","ok");
}

function deleteNode(id){
  if(id==="start"||id==="end"){toast("Cannot delete start/end","err");return}
  var n=getNode(id);if(!n)return;
  edges.filter(function(e){return e.source===id||e.target===id}).forEach(function(e){
    totalScore-=e.score;removeEdgeEl(e);
  });
  totalScore=Math.max(0,totalScore);
  edges=edges.filter(function(e){return e.source!==id&&e.target!==id});
  removeNodeEl(n);
  nodes=nodes.filter(function(x){return x.id!==id});
  document.getElementById("lbl-score").textContent=totalScore;
  toast("Node removed","ok");
}

// ---- Popup ----
function showPopup(x,y){
  var p=document.getElementById("popup");
  p.style.display="block";p.style.left=(x+10)+"px";p.style.top=(y-20)+"px";
  var inp=document.getElementById("popup-inp");inp.value="";
  setTimeout(function(){inp.focus()},50);
}
function hidePopup(){document.getElementById("popup").style.display="none";pendingEdgeSrc=null;pendingEdgePos=null;}

document.getElementById("popup-inp").addEventListener("keydown",function(ev){
  if(ev.key==="Escape"){hidePopup();return}
  if(ev.key!=="Enter")return;
  var word=ev.target.value.trim().toUpperCase();
  if(!word){hidePopup();return}
  if(nodes.find(function(n){return n.word===word})){toast("Word already exists","err");return}
  var srcToConnect=pendingEdgeSrc;
  var dropPos=pendingEdgePos;
  pendingEdgeSrc=null;
  pendingEdgePos=null;
  hidePopup();
  var ga=document.getElementById("ga"),rc=ga.getBoundingClientRect();
  var nx=dropPos?dropPos.x:rc.width/2;
  var ny=dropPos?dropPos.y:rc.height/2;
  var n={id:"n"+(nid++),word:word,type:"chain",x:nx,y:ny,em:"⏳"};
  nodes.push(n);makeNodeEl(n);
  toast("Added: "+word,"ok");
  fetchEmoji(word).then(function(icon){
    var nd=getNode(n.id);
    if(nd&&nd._el){nd.em=icon;EM[word]=icon;nd._el.emoji.textContent=icon}
  });
  if(srcToConnect){
    addEdge(srcToConnect,n.id);
  }
});
document.getElementById("popup").addEventListener("click",function(ev){ev.stopPropagation()});

// ---- Finish / Result ----
function finishGame(){
  var sn=nodes.find(function(n){return n.type==="start"});
  var en=nodes.find(function(n){return n.type==="end"});
  if(!sn||!en){toast("Choose a word pair first","err");return}
  var adj={};
  nodes.forEach(function(n){adj[n.id]=[]});
  edges.forEach(function(e){
    if(adj[e.source])adj[e.source].push(e.target);
    if(adj[e.target])adj[e.target].push(e.source);
  });
  var visited=new Set(),q=[sn.id];
  while(q.length){var cur=q.shift();if(visited.has(cur))continue;visited.add(cur);
    if(cur===en.id)break;(adj[cur]||[]).forEach(function(nb){q.push(nb)})}
  if(!visited.has(en.id)){toast("No path from start to end yet","err");return}
  showResult();
}

function showResult(){
  var el=edges.map(function(e){
    var s=getNode(e.source),t=getNode(e.target);
    return{src:s?s.word:"?",tgt:t?t.word:"?",score:e.score};
  });
  var tot=el.reduce(function(a,e){return a+e.score},0);
  var avg=el.length?Math.round(tot/el.length):0;
  var grade=avg>=75?"Brilliant!":avg>=58?"Excellent!":avg>=42?"Good job!":"Keep going!";
  document.getElementById("res-grade").textContent=grade;
  document.getElementById("res-sub").textContent=tot+" pts \u00b7 "+el.length+" edges \u00b7 avg: "+avg;
  document.getElementById("res-list").innerHTML=el.map(function(e){
    var c=e.score>=70?"#0F6E56":e.score>=45?"#185FA5":"#854F0B";
    return "<div class='rrow'><span>"+e.src+" \u2014 "+e.tgt+"</span><span style='font-weight:600;color:"+c+"'>"+e.score+"</span></div>";
  }).join("");
  document.getElementById("res-modal").style.display="flex";
}
function hideResult(){document.getElementById("res-modal").style.display="none"}

// ---- Pair modal ----
function showPairModal(){document.getElementById("pair-modal").style.display="flex"}
function hidePairModal(){document.getElementById("pair-modal").style.display="none"}
function pickRandom(){var p=randomPair();startGame(p[0],p[1])}

function buildGrid(){
  var grid=document.getElementById("pgrid");
  PAIRS.forEach(function(p){
    var btn=document.createElement("button");
    btn.className="pbtn";
    btn.textContent=(EM[p[0]]||"")+" "+p[0]+" \u2014 "+p[1]+" "+(EM[p[1]]||"");
    btn.onclick=function(){startGame(p[0],p[1])};
    grid.appendChild(btn);
  });
}

function startGame(start,end){
  startWord=start;endWord=end;
  // clear old
  nodes.forEach(function(n){removeNodeEl(n)});
  edges.forEach(function(e){removeEdgeEl(e)});
  nodes=[];edges=[];nid=0;totalScore=0;selectedEdge=null;busy=false;
  var ga=document.getElementById("ga"),W=ga.clientWidth,H=ga.clientHeight;
  var n1={id:"start",word:start,type:"start",x:Math.round(W*0.22),y:Math.round(H/2),em:em(start)};
  var n2={id:"end",  word:end,  type:"end",  x:Math.round(W*0.78),y:Math.round(H/2),em:em(end)};
  nodes.push(n1,n2);
  makeNodeEl(n1);makeNodeEl(n2);
  document.getElementById("lbl-start").textContent=start;
  document.getElementById("lbl-end").textContent=end;
  document.getElementById("lbl-score").textContent="0";
  hidePairModal();
  toast("Build a bridge: "+start+" \u2014 "+end,"ok",3000);
}

document.addEventListener("keydown",function(ev){
  if((ev.key==="Delete"||ev.key==="Backspace")&&selectedEdge){
    var a=document.activeElement;
    if(a&&(a.tagName==="INPUT"||a.tagName==="TEXTAREA"))return;
    deleteEdge(selectedEdge);
  }
  if(ev.key==="Escape"){deselectEdge();hidePopup()}
});

window.pickRandom=pickRandom;
window.showPairModal=showPairModal;
window.hideResult=hideResult;
window.finishGame=finishGame;

buildGrid();
initSVG();
pickRandom();
window.addEventListener("resize",function(){
  var ga=document.getElementById("ga");
  svg.setAttribute("width",ga.clientWidth);
  svg.setAttribute("height",ga.clientHeight);
});
</script>
